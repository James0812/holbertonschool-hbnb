<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review - HBnB</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <img src="logo.png" alt="HBnB Logo" class="logo">

    <div id="user-info" class="user-info" style="display: none;">
        <span id="username-display"></span>
        <button id="logout-btn" class="logout-btn">Logout</button>
    </div>

    <a href="login.html" id="login-link" class="login-button">Login</a>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="login.html" id="nav-login-link">Login</a>
</nav>

<main>
    <h1>Add a Review</h1>

    <form id="review-form">
        <label for="rating">Rating (1–5):</label>
        <select id="rating" required>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>

        <label for="comment">Comment:</label>
        <textarea id="comment" required></textarea>

        <button type="submit">Submit Review</button>
    </form>
</main>

<footer>
    <p>&copy; 2024 HBnB - All rights reserved.</p>
</footer>

<script src="scripts.js"></script>
</body>
</html>
