<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un avis – HBnB</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="scripts.js"></script>
</head>
<body>

<header>
    <a href="index.html" class="header-logo">
        <div class="logo-icon">🏠</div>
        <div class="logo-text">HBnB</div>
    </a>

    <div class="header-right">
        <div id="user-info" class="user-info" style="display:none;">
            <span id="username-display"></span>
            <button id="logout-btn">Logout</button>
        </div>

        <div id="login-link">
            <a href="login.html">Connexion</a>
        </div>
    </div>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="login.html">Connexion</a>
</nav>

<main class="review-page">
    <div class="review-card-form">
        <h2>Ajouter un avis</h2>
        <p class="subtitle">Partagez votre expérience avec les autres voyageurs.</p>

        <form id="review-form">
            <div class="form-group">
                <label for="rating">Note (1–5) :</label>
                <select id="rating" required>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <div class="form-group">
                <label for="comment">Commentaire :</label>
                <textarea id="comment" required></textarea>
            </div>

            <button class="btn-primary" type="submit">Publier</button>
        </form>
    </div>
</main>

<footer>
    © 2024 HBnB - Tous droits réservés.
</footer>

</body>
</html>
