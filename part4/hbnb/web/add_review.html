<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Add Review</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="HBnB Logo" class="logo">
        <a href="login.html" id="login-link" class="login-button" style="display: none;">Login</a>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html" id="nav-login-link">Login</a>
    </nav>
    <main>
        <div class="form-container add-review">
            <h1>Add a Review</h1>
            <form id="review-form">
                <div class="form-group form">
                    <label for="rating">Rating</label>
                    <select id="rating" name="rating" required>
                        <option value="" disabled selected>Select a rating</option>
                        <option value="5">★★★★★ - Excellent</option>
                        <option value="4">★★★★☆ - Very good</option>
                        <option value="3">★★★☆☆ - Good</option>
                        <option value="2">★★☆☆☆ - Fair</option>
                        <option value="1">★☆☆☆☆ - Poor</option>
                    </select>
                </div>
                <div class="form-group form">
                    <label for="comment">Your review</label>
                    <textarea id="comment" name="comment" placeholder="Share your experience..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit Review</button>
            </form>
            <p style="margin-top: 15px; text-align: center;">
                <a href="place.html">&larr; Back to place</a>
            </p>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 HBnB - All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
