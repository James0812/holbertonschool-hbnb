<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <img src="logo.png" alt="HBnB Logo" class="logo">

    <div id="user-info" class="user-info" style="display: none;">
        <span id="username-display"></span>
        <button id="logout-btn" class="logout-btn">Logout</button>
    </div>

    <a href="login.html" id="login-link" class="login-button">Login</a>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="login.html" id="nav-login-link">Login</a>
</nav>

<main>
    <h1>Login</h1>

    <form id="login-form" class="login-form">
        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Password:</label>
        <input type="password" id="password" required>

        <button type="submit">Login</button>
    </form>
</main>

<footer>
    <p>&copy; 2024 HBnB - All rights reserved.</p>
</footer>

<script src="scripts.js"></script>
</body>
</html>
