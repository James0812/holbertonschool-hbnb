<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HBnB – Accueil</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="scripts.js"></script>
</head>
<body>

<header>
    <a href="index.html" class="header-logo">
        <div class="logo-icon">🏠</div>
        <div class="logo-text">HBnB</div>
    </a>

    <div class="header-right">
        <div id="user-info" class="user-info" style="display:none;">
            <span id="username-display"></span>
            <button id="logout-btn">Logout</button>
        </div>

        <div id="login-link">
            <a href="login.html">Connexion</a>
        </div>
    </div>
</header>

<nav>
    <a href="index.html">Home</a>
</nav>

<section class="hero">
    <span class="hero-badge">Bienvenue</span>
    <h1>Trouvez votre prochain séjour</h1>
    <p>Des logements uniques, partout dans le monde.</p>
</section>

<section class="filter-bar">
    <label for="price-filter">Prix max :</label>
    <select id="price-filter">
        <option value="all">Tous</option>
        <option value="50">50€</option>
        <option value="100">100€</option>
        <option value="200">200€</option>
    </select>
</section>

<main class="places-section">
    <h2>Logements disponibles</h2>
    <div id="places-list"></div>
</main>

<footer>
    © 2024 HBnB - Tous droits réservés.
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const token = getCookie("token");
    updateUserUI(token);
});
</script>

</body>
</html>
